<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Rental Shield</title>
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="css/main.css">

  <!-- Facebook Pixel Code -->
  <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', 'FB_PIXEL_ID_PLACEHOLDER');
    fbq('track', 'PageView');
  </script>
  <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=FB_PIXEL_ID_PLACEHOLDER&ev=PageView&noscript=1"
  /></noscript>
  <!-- End Facebook Pixel Code -->

  <!-- AOS Animations -->
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
</head>

<body>
<nav class="navbar scrolled">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon"><img src="assets/images/logo.png" alt="Rental Shield Logo" width="200" height="60" style="object-fit: contain;"></div>
    </a>
    <div class="nav-right"><a href="index.html#quote" class="btn btn-primary btn-sm">Get a Quote</a></div>
  </div>
</nav>

<div class="auth-page" style="padding-top:88px">
  <div class="container">
    <div class="auth-box" style="max-width: 440px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);">
      <div class="auth-right">
        <span class="badge badge-primary" style="margin-bottom:16px">Customer Portal</span>
        <h2>Sign In</h2>
        <p style="margin-bottom:28px">Access your policies and claims.</p>

        <form class="auth-form" id="loginForm">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" id="loginEmail" class="form-input" placeholder="your@email.com" required>
          </div>
          
          <div id="passwordSection">
            <div class="form-group">
              <label class="form-label">Password</label>
              <div style="position:relative">
                <input type="password" id="loginPass" class="form-input" placeholder="••••••••" style="padding-right:44px">
                <button type="button" data-toggle-pass style="position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:12px;font-weight:600;color:var(--text-muted);background:none;border:none;cursor:pointer">SHOW</button>
              </div>
            </div>
            <div class="flex-between" style="font-size:13px; margin-bottom:12px">
              <label class="form-check" style="gap:6px">
                <input type="checkbox" style="width:14px;height:14px;accent-color:var(--primary)">
                <span>Remember me</span>
              </label>
              <a href="#" style="color:var(--primary);font-weight:600">Forgot password?</a>
            </div>
            <button type="submit" id="signInPassBtn" class="btn btn-primary btn-full">Sign In →</button>
            <button type="button" id="useOtpBtn" class="btn btn-outline btn-full" style="margin-top:8px">Login with Email Code instead</button>
          </div>

          <div id="otpSection" style="display:none">
            <div class="form-group">
              <label class="form-label">One-Time Passcode</label>
              <p style="font-size:12px;color:var(--text-muted);margin-bottom:8px">Check your email for a 6-digit code.</p>
              <input type="text" id="loginOtp" class="form-input" placeholder="123456" autocomplete="one-time-code" maxlength="6" inputmode="numeric" style="letter-spacing:4px; font-weight:700; text-align:center; font-size:18px;">
            </div>
            <button type="button" id="verifyOtpBtn" class="btn btn-primary btn-full">Verify Code & Sign In →</button>
            <button type="button" id="backToPasswordBtn" class="btn btn-outline btn-full" style="margin-top:8px">Use Password instead</button>
          </div>

        </form>

        <div class="auth-divider" style="margin:20px 0">
          <span></span><p>or</p><span></span>
        </div>

        <div class="auth-link">Don't have an account? <a href="register.html">Create one →</a></div>
        <div class="auth-link" style="margin-top:8px"><a href="admin-login.html" style="font-size:12px;color:var(--text-light)">Admin? Sign in here →</a></div></div></div>
</div>
<script src="js/app.js"></script>
<script src="js/api.js"></script>

  <!-- Initialize AOS -->
  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script>
    if(typeof AOS !== 'undefined') {
        AOS.init({ once: true, duration: 600, easing: 'ease-out-cubic' });
    }
    // Track quote form submit
    const globalQuoteForm = document.getElementById('quoteForm');
    if (globalQuoteForm) {
       globalQuoteForm.addEventListener('submit', function() {
           if(typeof fbq !== 'undefined') {
               fbq('track', 'InitiateCheckout');
           }
       });
    }
  </script>
</body>

</html>
