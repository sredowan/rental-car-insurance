  <div class="dashboard-main">
    <div class="dashboard-topbar"><div class="topbar-title">Customers</div><div class="topbar-right"><div class="topbar-avatar">SA</div></div></div>
    <div class="dashboard-content">
      <!-- KPIs -->
      <div class="kpi-grid" style="margin-bottom:24px">
        <div class="kpi-card"><div class="kpi-label">Total Customers</div><div class="kpi-value" id="kpi-total">—</div></div>
        <div class="kpi-card"><div class="kpi-label">This Month</div><div class="kpi-value" id="kpi-month" style="color:var(--emerald)">—</div></div>
        <div class="kpi-card"><div class="kpi-label">With Active Policy</div><div class="kpi-value" id="kpi-active" style="color:var(--blue)">—</div></div>
        <div class="kpi-card"><div class="kpi-label">Total Claims</div><div class="kpi-value" id="kpi-claims" style="color:var(--amber)">—</div></div>
      </div>

      <!-- Search -->
      <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap">
        <input type="text" id="customerSearch" class="form-input" placeholder="Search by name, email, phone or state..." style="flex:1;min-width:200px;height:40px;font-size:13px">
      </div>

      <!-- Table -->
      <div class="chart-card">
        <table class="data-table">
          <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>State</th><th>Policies</th><th>Claims</th><th>Joined</th></tr></thead>
          <tbody id="customersTableBody"><tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text-muted)">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script src="js/app.js"></script>
<script src="js/api.js"></script>
<script src="js/admin-customers.js"></script>

  <!-- Initialize AOS -->
  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script>
    if(typeof AOS !== 'undefined') {
        AOS.init({ once: true, duration: 600, easing: 'ease-out-cubic' });
    }
    // Track quote form submit
    const globalQuoteForm = document.getElementById('quoteForm');
    if (globalQuoteForm) {
       globalQuoteForm.addEventListener('submit', function() {
           if(typeof fbq !== 'undefined') {
               fbq('track', 'InitiateCheckout');
           }
       });
    }
  </script>
