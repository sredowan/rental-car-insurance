<script src="js/api.js"></script>
<script>
(function() {
  const tbody = document.getElementById('auditTableBody');
  let currentPage = 1;

  const fmt = d => d ? new Date(d).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '—';

  const actionBadge = (a) => {
    const map = { login: 'badge-blue', claim_update: 'badge-amber', policy_update: 'badge-emerald', settings_update: 'badge-grey', admin_create: 'badge-primary', admin_deactivate: 'badge-grey' };
    return `<span class="badge ${map[a] || 'badge-grey'}">${(a || 'unknown').replace(/_/g, ' ')}</span>`;
  };

  async function load() {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-muted)">Loading...</td></tr>';
    const action = document.getElementById('auditActionFilter')?.value || '';
    let url = `admin/audit?page=${currentPage}&limit=30`;
    if (action) url += `&action=${action}`;

    try {
      const res = await apiCall(url);
      const logs = res.data || [];

      if (logs.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-muted)">No audit entries found</td></tr>';
        return;
      }

      tbody.innerHTML = logs.map(l => `
        <tr>
          <td style="font-size:12px;color:var(--text-muted)">#${l.id}</td>
          <td>${actionBadge(l.action)}</td>
          <td style="font-size:13px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.details || '—'}</td>
          <td style="font-weight:600;font-size:13px">${l.admin_name || 'System'}</td>
          <td class="mono" style="font-size:11px;color:var(--text-muted)">${l.ip_address || '—'}</td>
          <td style="font-size:12px;color:var(--text-muted)">${fmt(l.created_at)}</td>
        </tr>
      `).join('');

      // Simple pagination
      const total = res.pagination?.total || logs.length;
      const pages = Math.ceil(total / 30);
      const pg = document.getElementById('auditPagination');
      if (pages > 1) {
        pg.innerHTML = Array.from({length: Math.min(pages, 10)}, (_, i) => 
          `<button class="btn ${i+1 === currentPage ? 'btn-primary' : 'btn-outline'} btn-sm" style="min-width:36px" onclick="goPage(${i+1})">${i+1}</button>`
        ).join('');
      } else {
        pg.innerHTML = '';
      }
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--primary)">${err.message || 'Failed to load'}</td></tr>`;
    }
  }

  window.goPage = (p) => { currentPage = p; load(); };
  document.getElementById('auditActionFilter')?.addEventListener('change', () => { currentPage = 1; load(); });
  load();
})();
</script>
