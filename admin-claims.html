<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claims Management | Admin — Rental Sheild</title>
<link rel="stylesheet" href="css/main.css">
<style>
.claim-detail-panel{position:fixed;top:0;right:-520px;width:520px;height:100vh;background:#fff;box-shadow:-8px 0 32px rgba(11,30,61,0.12);z-index:1000;transition:right .3s ease;overflow-y:auto;display:flex;flex-direction:column}
.claim-detail-panel.open{right:0}
.panel-overlay{position:fixed;inset:0;background:rgba(11,30,61,0.3);z-index:999;opacity:0;pointer-events:none;transition:opacity .3s}
.panel-overlay.open{opacity:1;pointer-events:all}
.panel-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.panel-body{padding:24px;flex:1;overflow-y:auto}
.panel-footer{padding:16px 24px;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg-soft)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.detail-item label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);font-weight:600;display:block;margin-bottom:2px}
.detail-item p{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:14px;color:var(--text-dark)}
.status-select{padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:13px;font-weight:600;background:#fff;width:100%;cursor:pointer}
.doc-list{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.doc-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg-soft);border-radius:var(--r-sm);font-size:13px}
.doc-icon{width:32px;height:32px;border-radius:6px;background:var(--primary-lt);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.search-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.search-bar input{flex:1;min-width:200px}
</style>

  <!-- Facebook Pixel Code -->

    n.callMethod.apply(n,arguments):n.queue.push(arguments)};

    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');

    fbq('track', 'PageView');

  <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=FB_PIXEL_ID_PLACEHOLDER&ev=PageView&noscript=1"
  /></noscript>

  <!-- AOS Animations -->
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
</head>

<body>
<div class="dashboard-layout">
  <!-- Sidebar -->
  <aside class="sidebar" id="adminSidebar">
    <div class="sidebar-logo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> Admin Portal</div>
    <nav class="sidebar-nav">
      <a href="admin-dashboard.html" class="sidebar-item" style="color:#ffffff;text-decoration:none"><svg class="sidebar-item-icon" style="width:16px;height:16px;margin-right:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg> Dashboard</a>
      <a href="admin-quotes.html" class="sidebar-item" style="color:#ffffff;text-decoration:none"><svg class="sidebar-item-icon" style="width:16px;height:16px;margin-right:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 10 20 15 15 20"/><path d="M4 4v7a4 4 0 0 0 4 4h12"/></svg> Quotes</a>
      <a href="admin-policies.html" class="sidebar-item" style="color:#ffffff;text-decoration:none"><svg class="sidebar-item-icon" style="width:16px;height:16px;margin-right:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> Policies</a>
      <div class="sidebar-item active" style="color:rgba(245,158,11,0.9)"><svg class="sidebar-item-icon" style="width:16px;height:16px;margin-right:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg> Claims <span class="badge badge-amber" style="margin-left:auto;font-size:10px" id="pendingCount">—</span></div>
      <a href="admin-customers.html" class="sidebar-item" style="color:#ffffff;text-decoration:none"><svg class="sidebar-item-icon" style="width:16px;height:16px;margin-right:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg> Customers</a>
      <a href="admin-mailbox.html" class="sidebar-item" style="color:#ffffff;text-decoration:none"><svg class="sidebar-item-icon" style="width:16px;height:16px;margin-right:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg> Mailbox</a>
      <div class="sidebar-divider"></div>
      <a href="admin-settings.html" class="sidebar-item" style="color:#ffffff;text-decoration:none"><svg class="sidebar-item-icon" style="width:16px;height:16px;margin-right:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg> Settings</a>
    </nav>
    <div class="sidebar-bottom">
      <a href="admin-login.html" class="sidebar-item" style="color:rgba(239,68,68,0.8);text-decoration:none;padding:8px 0"><span class="sidebar-item-icon">→</span> Sign Out</a>
    </div>
  </aside>

  <div class="dashboard-main">
    <div class="dashboard-topbar">
      <div class="topbar-title">Claims Management</div>
      <div class="topbar-right"><div class="topbar-avatar">SA</div></div>
    </div>

    <div class="dashboard-content">
      <!-- Search & Filter -->
      <div class="search-bar">
        <input type="text" id="claimSearch" class="form-input" placeholder="Search by claim #, customer name, or policy..." style="height:40px;font-size:13px">
        <select id="claimStatusFilter" class="form-input form-select" style="width:180px;height:40px;font-size:13px">
          <option value="">All Statuses</option>
          <option value="submitted">Submitted</option>
          <option value="under_review">Under Review</option>
          <option value="approved">Approved</option>
          <option value="denied">Denied</option>
          <option value="paid">Paid</option>
        </select>
      </div>

      <!-- Claims Table -->
      <div class="chart-card">
        <table class="data-table" id="claimsTable">
          <thead>
            <tr>
              <th>Claim #</th>
              <th>Customer</th>
              <th>Policy</th>
              <th>Damage Type</th>
              <th>Amount</th>
              <th>Status</th>
              <th>Submitted</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="claimsTableBody">
            <tr><td colspan="8" style="text-align:center;padding:32px;color:var(--text-muted)">Loading claims...</td></tr>
          </tbody>
        </table>
        <div id="claimsPagination" style="display:flex;justify-content:space-between;align-items:center;padding:16px 0;margin-top:12px;border-top:1px solid var(--border)"></div>
      </div>
    </div>
  </div>
</div>

<!-- Detail Panel -->
<div class="panel-overlay" id="panelOverlay"></div>
<div class="claim-detail-panel" id="claimPanel">
  <div class="panel-header">
    <div>
      <div style="font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);font-weight:700">Claim Detail</div>
      <div class="mono" style="font-size:18px;color:var(--blue)" id="panel-claimNumber">—</div>
    </div>
    <button onclick="closePanel()" style="background:none;border:none;font-size:24px;cursor:pointer;color:var(--text-muted)">×</button>
  </div>
  <div class="panel-body">
    <div class="detail-grid">
      <div class="detail-item"><label>Customer</label><p id="panel-customer">—</p></div>
      <div class="detail-item"><label>Policy</label><p id="panel-policy" class="mono" style="color:var(--blue);font-size:12px">—</p></div>
      <div class="detail-item"><label>Incident Date</label><p id="panel-incidentDate">—</p></div>
      <div class="detail-item"><label>Submitted</label><p id="panel-submitted">—</p></div>
      <div class="detail-item"><label>Damage Types</label><p id="panel-damageTypes">—</p></div>
      <div class="detail-item"><label>Rental Company</label><p id="panel-rentalCompany">—</p></div>
      <div class="detail-item"><label>Amount Claimed</label><p id="panel-amountClaimed" style="color:var(--primary);font-size:16px">—</p></div>
      <div class="detail-item"><label>Current Status</label><p id="panel-status">—</p></div>
    </div>

    <div style="margin-bottom:16px"><label style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);font-weight:600">Description</label><p id="panel-description" style="font-size:13px;color:var(--text-body);line-height:1.6;margin-top:4px">—</p></div>

    <div style="margin-bottom:20px">
      <label style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);font-weight:600;margin-bottom:8px;display:block">Documents</label>
      <div class="doc-list" id="panel-documents">
        <div class="doc-item"><span style="color:var(--text-muted)">No documents</span></div>
      </div>
    </div>
  </div>

  <div class="panel-footer">
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label" style="font-size:11px">Update Status</label>
        <select id="panel-statusSelect" class="status-select">
          <option value="submitted">Submitted</option>
          <option value="under_review">Under Review</option>
          <option value="approved">Approved</option>
          <option value="denied">Denied</option>
          <option value="paid">Paid</option>
        </select>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label" style="font-size:11px">Admin Notes</label>
        <textarea id="panel-notes" class="form-input" rows="2" placeholder="Add notes..." style="resize:vertical;height:auto;font-size:13px"></textarea>
      </div>
      <button id="panel-updateBtn" class="btn btn-primary btn-full btn-sm">Update Claim</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/api.js"></script>
<script src="js/admin-claims.js"></script>

  <!-- Initialize AOS -->
  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script>
    if(typeof AOS !== 'undefined') {
        AOS.init({ once: true, duration: 600, easing: 'ease-out-cubic' });
    }
    // Track quote form submit
    const globalQuoteForm = document.getElementById('quoteForm');
    if (globalQuoteForm) {
       globalQuoteForm.addEventListener('submit', function() {
           if(typeof fbq !== 'undefined') {
               fbq('track', 'InitiateCheckout');
           }
       });
    }
  </script>

</body>

</html>
