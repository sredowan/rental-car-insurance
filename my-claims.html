<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Claims | Rental Shield</title>
<link rel="stylesheet" href="css/main.css">

    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;

<body>
<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> Rental Shield</div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="sidebar-item" style="color:#ffffff;text-decoration:none"><svg class="sidebar-item-icon" style="width:16px;height:16px;margin-right:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Dashboard</a>
      <a href="my-policies.html" class="sidebar-item" style="color:#ffffff;text-decoration:none"><svg class="sidebar-item-icon" style="width:16px;height:16px;margin-right:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> My Policies</a>
      <div class="sidebar-item active"><svg class="sidebar-item-icon" style="width:16px;height:16px;margin-right:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg> My Claims</div>
    </nav>
    <div class="sidebar-bottom">
      <a href="#" class="sidebar-item" data-signout style="color:rgba(239,68,68,0.8);text-decoration:none;padding:8px 0"><span class="sidebar-item-icon">→</span> Sign Out</a>
    </div>
  </aside>
  <div class="dashboard-main">
    <div class="dashboard-topbar">
      <div class="topbar-title">My Claims</div>
      <div class="topbar-right">
        <a href="claims.html" class="btn btn-primary btn-sm">+ New Claim</a>
        <div class="topbar-avatar"></div>
      </div>
    </div>
    <div class="dashboard-content">
      <!-- Filter Tabs -->
      <div style="display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap">
        <button class="btn btn-primary btn-sm" data-filter="all">All (0)</button>
        <button class="btn btn-outline btn-sm" data-filter="submitted">Submitted (0)</button>
        <button class="btn btn-outline btn-sm" data-filter="under_review">Under Review (0)</button>
        <button class="btn btn-outline btn-sm" data-filter="approved">Approved (0)</button>
        <button class="btn btn-outline btn-sm" data-filter="paid">Paid (0)</button>
        <button class="btn btn-outline btn-sm" data-filter="denied">Denied (0)</button>
      </div>

      <!-- Dynamic Claim Cards -->
      <div id="claimsContainer">
        <div style="text-align:center;padding:48px;color:var(--text-muted)">Loading claims...</div>
      </div>
    </div>
  </div>
</div>
<script src="js/app.js"></script>
<script src="js/api.js"></script>
<script src="js/my-claims.js"></script>

  <!-- Initialize AOS -->
  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script>
    if(typeof AOS !== 'undefined') {
        AOS.init({ once: true, duration: 600, easing: 'ease-out-cubic' });
    }
    // Track quote form submit
    const globalQuoteForm = document.getElementById('quoteForm');
    if (globalQuoteForm) {
       globalQuoteForm.addEventListener('submit', function() {
           if(typeof fbq !== 'undefined') {
               fbq('track', 'InitiateCheckout');
           }
       });
    }
  </script>

<!-- Mobile App Bottom Nav -->
<div class="app-bottom-nav">
  <a href="dashboard.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Home</span>
  </a>
  <a href="my-policies.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>

    <span>Claims</span>

    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>Profile</span>
  </a>
</div>

</body>

</html>
