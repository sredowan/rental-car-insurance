<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Mailbox | Rental Shield</title>
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="css/main.css">
<style>
.mailbox-layout { display:flex; gap:20px; height: calc(100vh - 120px); overflow:hidden; }
.mailbox-sidebar { width: 260px; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r-lg); display:flex; flex-direction:column; }
.mailbox-list { flex:1; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r-lg); overflow-y:auto; display:flex; flex-direction:column; }
.mailbox-viewer { flex:2; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r-lg); display:flex; flex-direction:column; overflow:hidden; }

.mail-folder { padding: 12px 16px; cursor:pointer; display:flex; align-items:center; gap:12px; color:var(--text-muted); font-size:14px; font-weight:500; border-left:3px solid transparent; transition:0.2s; }
.mail-folder:hover { background:var(--bg-soft); color:var(--text-dark); }
.mail-folder.active { background:var(--bg-soft); color:var(--primary); border-left-color:var(--primary); }

.mail-item { padding:16px; border-bottom:1px solid var(--border); cursor:pointer; display:flex; flex-direction:column; gap:4px; transition:0.2s; }
.mail-item:hover { background:var(--bg-soft); }
.mail-item.unread { background:#f0f9ff; }
.mail-item.unread .mail-subject { font-weight:700; color:var(--text-dark); border-left: 3px solid var(--primary); padding-left: 8px;}

.mail-name { font-size:14px; font-weight:700; color:var(--text-dark); display:flex; justify-content:space-between; }
.mail-time { font-size:11px; color:var(--text-muted); font-weight:500; }
.mail-subject { font-size:13px; color:var(--text-body); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.mail-viewer-header { padding:20px; border-bottom:1px solid var(--border); display:flex; flex-direction:column; gap:8px; }
.mail-viewer-body { flex:1; padding:20px; overflow-y:auto; background:var(--bg-soft); display:flex; flex-direction:column; gap:16px; }

.chat-bubble { max-width:80%; padding:14px 18px; border-radius:16px; font-size:14px; line-height:1.5; white-space:pre-wrap; }
.chat-inbound { background:#ffffff; color:var(--text-dark); align-self:flex-start; border:1px solid var(--border); border-bottom-left-radius:4px; }
.chat-outbound { background:var(--primary); color:#ffffff; align-self:flex-end; border-bottom-right-radius:4px; }

.mail-viewer-reply { padding:20px; border-top:1px solid var(--border); background:#ffffff; }
</style>
</head>
<body>
<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Admin Portal
    </div>
    <nav class="sidebar-nav">
      <a href="admin-dashboard.html" class="sidebar-item" style="color:#ffffff;text-decoration:none"><svg class="sidebar-item-icon" style="width:16px;height:16px;margin-right:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg> Dashboard</a>
      <a href="admin-quotes.html" class="sidebar-item" style="color:#ffffff;text-decoration:none"><svg class="sidebar-item-icon" style="width:16px;height:16px;margin-right:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 10 20 15 15 20"/><path d="M4 4v7a4 4 0 0 0 4 4h12"/></svg> Quotes</a>
      <a href="admin-policies.html" class="sidebar-item" style="color:#ffffff;text-decoration:none"><svg class="sidebar-item-icon" style="width:16px;height:16px;margin-right:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> Policies</a>
      <a href="admin-claims.html" class="sidebar-item" style="color:#ffffff;text-decoration:none"><svg class="sidebar-item-icon" style="width:16px;height:16px;margin-right:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg> Claims</a>
      <a href="admin-customers.html" class="sidebar-item" style="color:#ffffff;text-decoration:none"><svg class="sidebar-item-icon" style="width:16px;height:16px;margin-right:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg> Customers</a>
      <a href="admin-revenue.html" class="sidebar-item" style="color:#ffffff;text-decoration:none"><svg class="sidebar-item-icon" style="width:16px;height:16px;margin-right:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> Revenue</a>
      <div class="sidebar-item active" style="color:var(--primary);display:flex;align-items:center;">
        <svg class="sidebar-item-icon" style="width:16px;height:16px;margin-right:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <span style="flex:1">Mailbox</span>
        <span class="badge badge-primary" id="sidebarMailBadge" style="font-size:10px;padding:2px 6px;display:none">0</span>
      </div>
      <div class="sidebar-divider"></div>
      <a href="admin-settings.html" class="sidebar-item" style="color:#ffffff;text-decoration:none"><svg class="sidebar-item-icon" style="width:16px;height:16px;margin-right:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg> Settings</a>
    </nav>
    <div class="sidebar-bottom">
      <a href="admin-login.html" class="sidebar-item" style="color:rgba(239,68,68,0.8);text-decoration:none;padding:8px 0"><span class="sidebar-item-icon">→</span> Sign Out</a>
    </div>
  </aside>

  <div class="dashboard-main">
    <div class="dashboard-topbar">
      <div class="topbar-title">Support Mailbox</div>
    </div>

    <div class="dashboard-content mailbox-layout">
      <!-- Folder Sidebar -->
      <div class="mailbox-sidebar">
        <div style="padding:20px; border-bottom:1px solid var(--border)">
          <button class="btn btn-primary btn-full" onclick="alert('Mailbox is ready to use.')">Compose (Disabled)</button>
        </div>
        <div class="mail-folder active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
          Inbox
        </div>
      </div>

      <!-- Thread List -->
      <div class="mailbox-list" id="threadList">
        <div style="padding:40px;text-align:center;color:var(--text-muted)">Loading messages...</div>
      </div>

      <!-- Active Thread Viewer -->
      <div class="mailbox-viewer">
        <div class="mail-viewer-header" id="activeHeader" style="display:none">
          <h3 id="activeSubject" style="margin:0"></h3>
          <div style="display:flex;justify-content:space-between;color:var(--text-muted);font-size:13px">
            <span id="activeName"></span>
            <span id="activeEmail"></span>
          </div>
        </div>
        <div class="mail-viewer-body" id="activeBody">
          <div style="margin:auto;text-align:center;color:var(--text-muted)">Select a conversation to view</div>
        </div>
        <div class="mail-viewer-reply" id="activeReply" style="display:none">
          <textarea id="replyText" class="form-input" style="height:100px;resize:none;margin-bottom:12px" placeholder="Type your reply here. This will be sent as a real email to the customer..."></textarea>
          <div style="display:flex;justify-content:flex-end">
            <button class="btn btn-primary" id="btnSendReply">Send Reply</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="js/app.js"></script>
<script src="js/api.js"></script>
<script src="js/admin-mailbox.js"></script>
</body>
</html>
